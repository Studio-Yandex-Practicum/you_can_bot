name: CI Lint & Tests

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    -
      name: Check out the repo
      uses: actions/checkout@v4
    -
      name: Setup Poetry
      uses: Gr1N/setup-poetry@v9
      with:
        poetry-version: "1.8.2"
    -
      name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    -
      name: Install dependencies
      run: |
        poetry install
    -
      name: Test with flake8
      run: |
        poetry run flake8 .
    -
      name: Test with isort
      run: |
        poetry run isort . --check --diff

  tests:
    needs: lint
    runs-on: ubuntu-latest

    steps:
    -
      name: Check out the repo
      uses: actions/checkout@v4
    -
      name: Setup Poetry
      uses: Gr1N/setup-poetry@v9
      with:
        poetry-version: "1.8.2"
    -
      name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    -
      name: Install dependencies
      run: |
        poetry install
    -
      name: Django tests
      env:
        NEED_SQLITE: True
      run: |
        poetry run python src/backend/manage.py test src/backend
    -
      name: Bot tests
      env:
        NEED_SQLITE: True
      run: |
        cd src/bot
        poetry run python -m unittest
