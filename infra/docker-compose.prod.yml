services:
    db:
      image: postgres:16-alpine
      container_name: db
      restart: always
      volumes:
        - data_value:/var/lib/postgresql/data/
      environment:
        LANG: "ru_RU.UTF-8"
        POSTGRES_INITDB_ARGS: '--locale-provider=icu --icu-locale=ru-RU'
      expose:
        - "5432"
      env_file:
        - ../.env


    backend:
      image: ghcr.io/studio-yandex-practicum/you_can_bot:prod
      container_name: backend
      command: bash -c "cd backend/ && gunicorn backend.wsgi:application --bind 0:8000"
      restart: always
      volumes:
        - static_value:/app/backend/static/
        - media_value:/app/backend/media/
        - ../.data/logs/:/app/.data/logs/
      expose:
        - "8000"
      env_file:
        - ../.env
      depends_on:
        - db

    bot:
      image: ghcr.io/studio-yandex-practicum/you_can_bot:prod
      container_name: bot
      command: bash -c "cd bot/ && python run_bot.py"
      env_file:
        - ../.env
      restart: always
      volumes:
        - ../.data/logs/:/app/.data/logs/
      depends_on:
        - backend

    npm:
      image: jc21/nginx-proxy-manager:2.14.0
      container_name: npm
      restart: always
      ports:
        - "80:80"
        - "443:443"
        - "81:81"
      volumes:
        - npm_data:/data
        - npm_letsencrypt:/etc/letsencrypt
        - static_value:/data/static
        - media_value:/data/media
      depends_on:
        - bot
        - backend


volumes:
    static_value:
    media_value:
    data_value:
    npm_data:
    npm_letsencrypt:
